<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bouclier numerique avec un cadenas">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#2a2e55"/>
      <stop offset="100%" stop-color="#12131c"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#9d8df1"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" rx="32" fill="url(#bgGlow)"/>

  <!-- grille discrete en fond -->
  <g stroke="#3a3f63" stroke-width="1" opacity="0.4">
    <line x1="40" y1="40" x2="40" y2="360"/>
    <line x1="120" y1="40" x2="120" y2="360"/>
    <line x1="280" y1="40" x2="280" y2="360"/>
    <line x1="360" y1="40" x2="360" y2="360"/>
    <line x1="40" y1="40" x2="360" y2="40"/>
    <line x1="40" y1="360" x2="360" y2="360"/>
  </g>
  <g fill="#7dcfff" opacity="0.6">
    <circle cx="40" cy="40" r="3.5"/>
    <circle cx="360" cy="40" r="3.5"/>
    <circle cx="40" cy="360" r="3.5"/>
    <circle cx="360" cy="360" r="3.5"/>
    <circle cx="120" cy="80" r="2.5"/>
    <circle cx="300" cy="320" r="2.5"/>
  </g>

  <!-- bouclier -->
  <path d="M200 58 L304 96 V202 C304 274 258 326 200 350 C142 326 96 274 96 202 V96 Z"
        fill="url(#shieldGrad)" stroke="#0e0f16" stroke-width="5"/>
  <path d="M200 58 L304 96 V202 C304 274 258 326 200 350"
        fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="3"/>

  <!-- cadenas -->
  <path d="M176 196 V172 a24 24 0 0 1 48 0 V196" fill="none" stroke="#0e0f16" stroke-width="11" stroke-linecap="round"/>
  <rect x="160" y="196" width="80" height="64" rx="11" fill="#0e0f16"/>
  <circle cx="200" cy="222" r="8" fill="url(#shieldGrad)"/>
  <rect x="195.5" y="224" width="9" height="20" rx="3.5" fill="url(#shieldGrad)"/>
</svg>
